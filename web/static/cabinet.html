<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Кабинет — TenderFinder</title>
<style>
  :root{
    --bg:#f5f6f8; --surface:#ffffff; --surface-2:#fafbfc;
    --line:#e6e8ec; --line-2:#d4d8df;
    --ink:#10141d; --muted:#5b6472; --faint:#969eaa;
    --accent:#0e7c6b; --accent-ink:#0a584c;
    --ok:#157347; --ok-bg:#e9f5ee;
    --warn:#a85b08; --warn-bg:#fbf1e3;
    --bad:#b23128; --bad-bg:#fbeceb;
    --neutral:#5b6472; --neutral-bg:#eef0f3;
    --radius:12px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1116; --surface:#161b22; --surface-2:#1a2029;
      --line:#262d38; --line-2:#333c49;
      --ink:#e7eaef; --muted:#9aa4b2; --faint:#6b7585;
      --accent:#34b3a0; --accent-ink:#7fd6c8;
      --ok:#4ec07e; --ok-bg:#13241b;
      --warn:#e0a64a; --warn-bg:#2a2012;
      --bad:#e57368; --bad-bg:#2a1614;
      --neutral:#9aa4b2; --neutral-bg:#1f2630;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 20px 80px}
  @media(max-width:400px){ .wrap{padding-left:14px;padding-right:14px} }

  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px;letter-spacing:-.015em;color:var(--ink)}
  .brand .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#10b981);display:flex;align-items:center;justify-content:center}
  .brand .mark svg{width:16px;height:16px}
  .topnav{display:flex;align-items:center;flex-wrap:wrap;gap:8px 12px;font-size:14px}
  .topnav a{padding:8px 13px;border-radius:9px;color:var(--muted)}
  .topnav a:hover{color:var(--ink)}
  .topnav .back{border:1px solid var(--line)}
  .who{color:var(--muted);font-size:13px;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin:26px 0 20px}
  h1{font-size:23px;font-weight:650;letter-spacing:-.02em;margin:0 0 3px}
  .sub{color:var(--muted);font-size:14px;margin:0}
  .plan-badge{display:inline-flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:8px 8px 8px 15px;font-size:13px;color:var(--muted)}
  .plan-badge b{color:var(--ink);font-weight:650}
  .plan-days{font-size:11.5px;font-weight:600;color:var(--accent-ink);background:var(--ok-bg);border-radius:999px;padding:4px 10px}
  .plan-days.trial{color:var(--warn);background:var(--warn-bg)}
  .plan-up{font-size:12.5px;font-weight:600;color:#fff;background:var(--accent);border-radius:999px;padding:6px 13px}

  /* сигнатура — панель денег */
  .money{display:grid;grid-template-columns:1fr 1px 1fr;gap:0;
    background:linear-gradient(125deg,var(--ok-bg),transparent 62%),var(--surface);
    border:1px solid var(--accent);border-radius:18px;padding:24px 26px;margin-bottom:18px}
  .money-col{display:flex;flex-direction:column;gap:5px;padding:0 6px}
  .money-k{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .money-v{font-family:var(--mono);font-size:34px;font-weight:680;letter-spacing:-.01em;font-variant-numeric:tabular-nums;line-height:1.05}
  .money-v.pot{color:var(--accent-ink)}
  .money-v.won{color:var(--ok)}
  .money-sub{font-size:12px;color:var(--faint)}
  .money-div{background:var(--line)}

  /* KPI-плитки */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px}
  .kpi .n{font-family:var(--mono);font-size:25px;font-weight:680;letter-spacing:-.01em;font-variant-numeric:tabular-nums;line-height:1}
  .kpi .l{font-size:12.5px;color:var(--muted);margin-top:5px}
  .kpi .n.accent{color:var(--accent-ink)} .kpi .n.ok{color:var(--ok)} .kpi .n.muted{color:var(--ink)}

  /* секции */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:18px}
  .panel h2{font-size:15px;font-weight:650;margin:0 0 16px;letter-spacing:-.01em}
  .panel h2 .hint{font-weight:400;color:var(--faint);font-size:12.5px;margin-left:6px}

  /* воронка */
  .funnel{display:flex;flex-direction:column;gap:11px}
  .fn-row{display:grid;grid-template-columns:130px 1fr 40px;align-items:center;gap:12px}
  .fn-label{font-size:13px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .fn-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .fn-bar-wrap{background:var(--surface-2);border-radius:7px;height:24px;overflow:hidden;border:1px solid var(--line)}
  .fn-bar{height:100%;border-radius:7px 0 0 7px;min-width:2px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .fn-n{font-family:var(--mono);font-size:14px;font-weight:650;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink)}
  .dot-int{background:var(--neutral)} .bar-int{background:var(--neutral)}
  .dot-app{background:var(--warn)} .bar-app{background:var(--warn)}
  .dot-won{background:var(--ok)} .bar-won{background:var(--ok)}
  .dot-exe{background:var(--accent)} .bar-exe{background:var(--accent)}
  .dot-lost{background:var(--bad)} .bar-lost{background:var(--bad)}

  /* виджеты-действия */
  .widgets{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  .widget{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px 18px;display:flex;flex-direction:column;gap:9px}
  .widget .wt{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .widget .wv{font-size:21px;font-weight:680;letter-spacing:-.01em;color:var(--ink)}
  .widget .wv small{font-size:13px;font-weight:500;color:var(--muted)}
  .widget .wlink{margin-top:auto;font-size:13px;font-weight:600;color:var(--accent)}
  .widget.alert{border-color:var(--bad)} .widget.alert .wv{color:var(--bad)}
  .widget.go{border-color:var(--ok)} .widget.go .wv{color:var(--ok)}

  .cta{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
    background:linear-gradient(120deg,var(--ok-bg),transparent 70%),var(--surface);
    border:1px solid var(--accent);border-radius:16px;padding:18px 22px}
  .cta-tx{font-size:14.5px;color:var(--ink)}
  .cta-tx b{color:var(--accent-ink)}
  .cta-btn{font-size:14px;font-weight:600;color:#fff;background:var(--accent);border-radius:10px;padding:11px 20px;white-space:nowrap}

  .note{max-width:560px;margin:40px auto;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:38px 30px}
  .note h2{margin:0 0 8px;font-size:19px}
  .note p{color:var(--muted);margin:0 0 20px}
  .btn{display:inline-block;background:var(--accent);color:#fff;font-weight:600;padding:11px 22px;border-radius:10px}
  .loading{color:var(--muted);padding:50px;text-align:center}

  @media(max-width:820px){ .kpis{grid-template-columns:repeat(2,1fr)} .widgets{grid-template-columns:1fr} }
  @media(max-width:560px){
    .money{grid-template-columns:1fr;gap:18px} .money-div{display:none}
    .fn-row{grid-template-columns:104px 1fr 34px;gap:9px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a href="/" class="brand">
      <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
      TenderFinder
    </a>
    <div class="topnav">
      <a href="/">Витрина</a>
      <a href="/analytics">Аналитика</a>
      <a href="/favorites">★ Избранное</a>
      <a href="/" class="back" id="logout" style="display:none">Выйти</a>
      <span class="who" id="who"></span>
    </div>
  </div>

  <div id="root"><div class="loading">Загрузка кабинета…</div></div>
</div>

<script>
const $ = s => document.querySelector(s);
const TOKEN = localStorage.getItem("tf_token");
const money = n => new Intl.NumberFormat("ru-RU").format(Math.round(n||0)) + " ₸";
const num = n => new Intl.NumberFormat("ru-RU").format(n||0);
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function plural(n,a,b,c){const m=Math.abs(n)%100,d=m%10;return m>10&&m<20?c:d>1&&d<5?b:d===1?a:c;}

function note(title, text, href, btn){
  return `<div class="note"><h2>${title}</h2><p>${text}</p>${href?`<a class="btn" href="${href}">${btn}</a>`:""}</div>`;
}

const STAGES = [
  {k:"interested", label:"Интересно",   cls:"int"},
  {k:"applied",    label:"Подал заявку", cls:"app"},
  {k:"won",        label:"Выиграл",      cls:"won"},
  {k:"executing",  label:"Исполняю",     cls:"exe"},
  {k:"lost",       label:"Проиграл",     cls:"lost"},
];

function planBadge(a){
  if(!a.entitled){
    return `<div class="plan-badge"><span>Тариф <b>Демо</b></span><a class="plan-up" href="/pricing">Открыть доступ →</a></div>`;
  }
  let chip = "";
  if(a.trial && a.days_left!=null){
    chip = `<span class="plan-days trial">пробный · ${a.days_left} ${plural(a.days_left,"день","дня","дней")}</span>`;
  }else if(a.days_left!=null){
    chip = `<span class="plan-days">осталось ${a.days_left} ${plural(a.days_left,"день","дня","дней")}</span>`;
  }
  return `<div class="plan-badge"><span>Тариф <b>${esc(a.plan)}</b></span>${chip}</div>`;
}

function funnel(p){
  const max = Math.max(1, ...STAGES.map(s => p[s.k]||0));
  return `<div class="funnel">` + STAGES.map(s => {
    const n = p[s.k]||0;
    const w = Math.round((n/max)*100);
    return `<div class="fn-row">
      <span class="fn-label"><span class="fn-dot dot-${s.cls}"></span>${s.label}</span>
      <span class="fn-bar-wrap"><span class="fn-bar bar-${s.cls}" style="width:${n?Math.max(w,3):0}%"></span></span>
      <span class="fn-n">${n}</span>
    </div>`;
  }).join("") + `</div>`;
}

function render(d){
  const a = d.account || {};
  const t = d.totals || {};
  const p = d.pipeline || {};

  $("#who").textContent = a.email || "";
  if(TOKEN) $("#logout").style.display = "";

  // нет сохранённых сделок — онбординг
  if((t.saved||0) === 0){
    $("#root").innerHTML = `
      <div class="head">
        <div><h1>Личный кабинет</h1><p class="sub">Здесь будут ваши цифры по сделкам.</p></div>
        ${planBadge(a)}
      </div>` +
      note("Пока нет сделок в работе",
        "Откройте витрину, добавьте интересные тендеры в избранное (★) и ведите их по стадиям — здесь появятся ваша воронка, потенциальная прибыль и заработок.",
        "/", "Перейти к витрине");
    return;
  }

  const winRate = t.win_rate!=null ? t.win_rate + "%" : "—";
  const avgM = t.avg_margin!=null ? t.avg_margin + "%" : "—";

  // виджет дедлайнов
  let dlWidget;
  if((t.urgent||0) > 0){
    dlWidget = `<div class="widget alert">
      <div class="wt">⏰ Горящие сроки</div>
      <div class="wv">${t.urgent} <small>${plural(t.urgent,"тендер","тендера","тендеров")} ≤ 3 дней</small></div>
      <a class="wlink" href="/favorites">Открыть избранное →</a></div>`;
  }else if((t.soon||0) > 0){
    dlWidget = `<div class="widget">
      <div class="wt">📅 На этой неделе</div>
      <div class="wv">${t.soon} <small>${plural(t.soon,"тендер","тендера","тендеров")} ≤ 7 дней</small></div>
      <a class="wlink" href="/favorites">Открыть избранное →</a></div>`;
  }else{
    dlWidget = `<div class="widget">
      <div class="wt">📅 Сроки подачи</div>
      <div class="wv">Спокойно</div>
      <span class="wlink" style="color:var(--faint)">Ближайшие 7 дней свободны</span></div>`;
  }

  $("#root").innerHTML = `
    <div class="head">
      <div><h1>Личный кабинет</h1><p class="sub">Ваши сделки, прибыль и воронка — в одном месте.</p></div>
      ${planBadge(a)}
    </div>

    <div class="money">
      <div class="money-col">
        <div class="money-k">🎯 В работе — потенциальная прибыль</div>
        <div class="money-v pot">${money(t.potential_earn)}</div>
        <div class="money-sub">${t.active} ${plural(t.active,"активная сделка","активные сделки","активных сделок")} (интересно + подал)</div>
      </div>
      <div class="money-div"></div>
      <div class="money-col">
        <div class="money-k">🏆 Уже выиграно — заработок</div>
        <div class="money-v won">${money(t.won_earn)}</div>
        <div class="money-sub">${t.won} ${plural(t.won,"выигранный тендер","выигранных тендера","выигранных тендеров")}</div>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="n muted">${t.saved}</div><div class="l">Всего сделок</div></div>
      <div class="kpi"><div class="n accent">${t.active}</div><div class="l">В работе</div></div>
      <div class="kpi"><div class="n ok">${winRate}</div><div class="l">Конверсия в победу</div></div>
      <div class="kpi"><div class="n muted">${avgM}</div><div class="l">Средняя маржа</div></div>
    </div>

    <div class="panel">
      <h2>Воронка сделок <span class="hint">по стадиям</span></h2>
      ${funnel(p)}
    </div>

    <div class="widgets">
      ${dlWidget}
      <div class="widget go">
        <div class="wt">✅ Готовы к подаче</div>
        <div class="wv">${t.ready} <small>${plural(t.ready,"сделка","сделки","сделок")}</small></div>
        <a class="wlink" href="/favorites">Чек-листы →</a>
      </div>
      <div class="widget">
        <div class="wt">💼 Нужно на закуп (актив)</div>
        <div class="wv">${money(t.invest_active)}</div>
        <span class="wlink" style="color:var(--faint)">оборотный капитал</span>
      </div>
    </div>

    <div class="cta">
      <div class="cta-tx">Больше сделок — больше прибыль. <b>Найдите новые тендеры с уже посчитанной маржой.</b></div>
      <a class="cta-btn" href="/">Открыть витрину →</a>
    </div>
  `;
}

async function loadCabinet(){
  if(!TOKEN){
    $("#root").innerHTML = note("Войдите в аккаунт",
      "Личный кабинет привязан к вашему аккаунту — войдите, чтобы видеть свои цифры.",
      "/login", "Войти");
    return;
  }
  try{
    const r = await fetch("/api/cabinet", {headers:{"X-Auth-Token": TOKEN}});
    if(r.status === 401){ $("#root").innerHTML = note("Войдите в аккаунт","Сессия истекла — войдите снова.","/login","Войти"); return; }
    if(!r.ok){ $("#root").innerHTML = `<div class="note"><h2>Ошибка ${r.status}</h2><p>Не удалось загрузить кабинет. Обновите страницу.</p></div>`; return; }
    render(await r.json());
  }catch(e){
    $("#root").innerHTML = `<div class="note"><h2>Ошибка</h2><p>Не удалось загрузить кабинет.</p></div>`;
  }
}

$("#logout").addEventListener("click", (e) => {
  e.preventDefault();
  localStorage.removeItem("tf_token"); localStorage.removeItem("tf_role"); localStorage.removeItem("tf_email");
  location.href = "/";
});

loadCabinet();
</script>
</body>
</html>
