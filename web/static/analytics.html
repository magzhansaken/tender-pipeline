<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Аналитика рынка — TenderFinder</title>
<style>
  :root{
    --bg:#f5f6f8; --surface:#ffffff; --surface-2:#fafbfc;
    --line:#e6e8ec; --line-2:#d4d8df;
    --ink:#10141d; --muted:#5b6472; --faint:#969eaa;
    --accent:#0e7c6b; --accent-ink:#0a584c;
    --ok:#157347; --ok-bg:#e9f5ee;
    --warn:#a85b08; --warn-bg:#fbf1e3;
    --bad:#b23128; --bad-bg:#fbeceb;
    --neutral:#5b6472; --neutral-bg:#eef0f3;
    --radius:12px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1116; --surface:#161b22; --surface-2:#1a2029;
      --line:#262d38; --line-2:#333c49;
      --ink:#e7eaef; --muted:#9aa4b2; --faint:#6b7585;
      --accent:#34b3a0; --accent-ink:#7fd6c8;
      --ok:#4ec07e; --ok-bg:#13241b;
      --warn:#e0a64a; --warn-bg:#2a2012;
      --bad:#e57368; --bad-bg:#2a1614;
      --neutral:#9aa4b2; --neutral-bg:#1f2630;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 20px 80px}
  @media(max-width:400px){ .wrap{padding-left:14px;padding-right:14px} }

  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px;letter-spacing:-.015em;color:var(--ink)}
  .brand .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#10b981);display:flex;align-items:center;justify-content:center}
  .brand .mark svg{width:16px;height:16px}
  .topnav{display:flex;align-items:center;flex-wrap:wrap;gap:8px 12px;font-size:14px}
  .topnav a{padding:8px 13px;border-radius:9px;color:var(--muted)}
  .topnav a:hover{color:var(--ink)}
  .topnav .back{border:1px solid var(--line)}
  .who{color:var(--muted);font-size:13px;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  h1{font-size:23px;font-weight:650;letter-spacing:-.02em;margin:26px 0 3px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 20px;max-width:680px}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:18px}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .panel-head h2{font-size:16px;font-weight:650;margin:0;letter-spacing:-.01em}
  .panel-head .ph-sub{font-size:12.5px;color:var(--faint);margin-top:2px}

  /* переключатель сортировки */
  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{font:inherit;font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;border-radius:7px;padding:6px 13px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  .seg button:disabled{opacity:.5;cursor:not-allowed}

  /* locked-баннер */
  .lock-bar{display:flex;align-items:center;gap:11px;background:var(--warn-bg);border:1px solid var(--warn);border-radius:11px;
    padding:11px 14px;margin-bottom:16px;font-size:13.5px;color:var(--ink)}
  .lock-bar a{font-weight:600;color:var(--accent);white-space:nowrap;margin-left:auto}

  /* рейтинг категорий */
  .rk-row{display:grid;grid-template-columns:30px 1fr;align-items:start;gap:12px;padding:13px 0;border-top:1px solid var(--line)}
  .rk-row:first-child{border-top:none}
  .rk-num{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--faint);text-align:center;padding-top:1px}
  .rk-row:nth-child(-n+3) .rk-num{color:var(--accent-ink)}
  .rk-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:7px}
  .rk-cat{font-size:14.5px;font-weight:600;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rk-val{font-family:var(--mono);font-size:16px;font-weight:680;color:var(--accent-ink);flex:0 0 auto;font-variant-numeric:tabular-nums}
  .rk-val.lock{font-size:14px;color:var(--faint)}
  .rk-bar-wrap{background:var(--surface-2);border:1px solid var(--line);border-radius:6px;height:9px;overflow:hidden}
  .rk-bar{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),#10b981);min-width:2px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .rk-bar.vol{background:linear-gradient(90deg,var(--neutral),var(--muted))}
  .rk-meta{font-size:12px;color:var(--muted);margin-top:7px;display:flex;flex-wrap:wrap;gap:10px}
  .rk-meta b{color:var(--ink);font-weight:600}

  /* сезонность */
  .season{display:flex;align-items:flex-end;gap:6px;height:170px;padding-top:10px}
  .se-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;min-width:0}
  .se-bar-wrap{width:100%;flex:1;display:flex;align-items:flex-end;justify-content:center}
  .se-bar{width:74%;max-width:30px;background:linear-gradient(180deg,var(--accent),var(--accent-ink));border-radius:5px 5px 0 0;min-height:2px;transition:height .5s cubic-bezier(.2,.7,.2,1)}
  .se-bar.peak{background:linear-gradient(180deg,#10b981,var(--accent))}
  .se-n{font-family:var(--mono);font-size:11.5px;font-weight:650;color:var(--ink);height:14px;font-variant-numeric:tabular-nums}
  .se-m{font-size:11px;color:var(--muted)}
  .season-note{font-size:12px;color:var(--faint);margin-top:14px;line-height:1.5}

  .cta{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
    background:linear-gradient(120deg,var(--ok-bg),transparent 70%),var(--surface);
    border:1px solid var(--accent);border-radius:16px;padding:18px 22px;margin-top:4px}
  .cta-tx{font-size:14.5px;color:var(--ink)} .cta-tx b{color:var(--accent-ink)}
  .cta-btn{font-size:14px;font-weight:600;color:#fff;background:var(--accent);border-radius:10px;padding:11px 20px;white-space:nowrap}

  .note{max-width:560px;margin:40px auto;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:38px 30px}
  .note h2{margin:0 0 8px;font-size:19px}.note p{color:var(--muted);margin:0 0 20px}
  .btn{display:inline-block;background:var(--accent);color:#fff;font-weight:600;padding:11px 22px;border-radius:10px}
  .loading{color:var(--muted);padding:50px;text-align:center}

  @media(max-width:560px){
    .rk-meta{gap:7px;font-size:11.5px}
    .season{gap:3px;height:150px} .se-m{font-size:9.5px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a href="/" class="brand">
      <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
      TenderFinder
    </a>
    <div class="topnav">
      <a href="/" class="back">← Витрина</a>
      <a href="/cabinet">Кабинет</a>
      <a href="/favorites">★ Избранное</a>
      <span class="who" id="who"></span>
    </div>
  </div>

  <h1>Аналитика рынка</h1>
  <p class="sub">В каких категориях выгоднее работать и когда появляется больше тендеров — чтобы выбрать нишу и спланировать загрузку.</p>

  <div id="root"><div class="loading">Загрузка аналитики…</div></div>
</div>

<script>
const $ = s => document.querySelector(s);
const TOKEN = localStorage.getItem("tf_token");
const money = n => n==null ? "—" : new Intl.NumberFormat("ru-RU").format(Math.round(n)) + " ₸";
const num = n => new Intl.NumberFormat("ru-RU").format(n||0);
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function plural(n,a,b,c){const m=Math.abs(n)%100,d=m%10;return m>10&&m<20?c:d>1&&d<5?b:d===1?a:c;}
const MONTHS = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];

let DATA = null, sortMetric = "margin";

function note(title, text, href, btn){
  return `<div class="note"><h2>${title}</h2><p>${text}</p>${href?`<a class="btn" href="${href}">${btn}</a>`:""}</div>`;
}

function sortCats(metric){
  const arr = [...(DATA.categories||[])];
  if(metric === "margin") arr.sort((a,b) => (b.avg_margin??-1) - (a.avg_margin??-1));
  else arr.sort((a,b) => (b.lots||0) - (a.lots||0));
  return arr;
}

function rankingHtml(){
  const ent = DATA.entitled;
  const metric = (!ent ? "volume" : sortMetric);
  const arr = sortCats(metric).slice(0, 15);
  const maxV = metric === "margin"
    ? Math.max(1, ...arr.map(c => c.avg_margin||0))
    : Math.max(1, ...arr.map(c => c.lots||0));

  const rows = arr.map((c, i) => {
    const val = metric === "margin" ? c.avg_margin : c.lots;
    const w = val ? Math.max(Math.round((val/maxV)*100), 3) : 0;
    const valTxt = metric === "margin"
      ? `<span class="rk-val">${c.avg_margin!=null ? c.avg_margin + "%" : "—"}</span>`
      : `<span class="rk-val">${num(c.lots)}</span>`;
    let meta;
    if(metric === "margin"){
      meta = `<span><b>${num(c.lots)}</b> ${plural(c.lots,"лот","лота","лотов")}</span>`
           + `<span>ср. лот <b>${money(c.avg_lot)}</b></span>`
           + (c.total_margin!=null ? `<span>маржа на витрине <b>${money(c.total_margin)}</b></span>` : "");
    }else{
      meta = `<span>ср. лот <b>${money(c.avg_lot)}</b></span>`
           + (ent ? `<span>ср. маржа <b>${c.avg_margin!=null ? c.avg_margin+"%" : "—"}</b></span>`
                  : `<span>ср. маржа <b>🔒</b></span>`);
    }
    const barCls = metric === "margin" ? "" : "vol";
    return `<div class="rk-row">
      <span class="rk-num">${i+1}</span>
      <div class="rk-main">
        <div class="rk-head"><span class="rk-cat">${esc(c.category)}</span>${valTxt}</div>
        <div class="rk-bar-wrap"><div class="rk-bar ${barCls}" style="width:${w}%"></div></div>
        <div class="rk-meta">${meta}</div>
      </div>
    </div>`;
  }).join("");

  const toggle = ent ? `<div class="seg">
      <button data-sort="margin" class="${sortMetric==="margin"?"on":""}">По марже</button>
      <button data-sort="volume" class="${sortMetric==="volume"?"on":""}">По объёму</button>
    </div>` : "";
  const lockBar = ent ? "" : `<div class="lock-bar">🔒 Рейтинг по марже и потенциал категорий — на платных тарифах.<a href="/pricing">Открыть доступ →</a></div>`;

  return `<div class="panel">
    <div class="panel-head">
      <div><h2>Рейтинг категорий</h2><div class="ph-sub">${metric==="margin"?"отсортировано по средней марже":"отсортировано по числу тендеров"}</div></div>
      ${toggle}
    </div>
    ${lockBar}
    ${rows || '<p style="color:var(--muted)">Пока недостаточно данных по категориям.</p>'}
  </div>`;
}

function seasonHtml(){
  const s = DATA.seasonality || [];
  const max = Math.max(1, ...s.map(x => x.count));
  const peak = max;
  const bars = s.map(x => {
    const h = x.count ? Math.max(Math.round((x.count/max)*100), 4) : 0;
    const cls = (x.count === peak && x.count > 0) ? "peak" : "";
    return `<div class="se-col">
      <div class="se-bar-wrap"><div class="se-bar ${cls}" style="height:${h}%" title="${x.count} ${plural(x.count,"тендер","тендера","тендеров")}"></div></div>
      <div class="se-n">${x.count||""}</div>
      <div class="se-m">${MONTHS[x.month-1]}</div>
    </div>`;
  }).join("");
  return `<div class="panel">
    <div class="panel-head">
      <div><h2>Сезонность тендеров</h2><div class="ph-sub">${num(DATA.season_total)} ${plural(DATA.season_total,"тендер","тендера","тендеров")} с известным сроком</div></div>
    </div>
    <div class="season">${bars}</div>
    <p class="season-note">Распределение открытых тендеров по месяцу срока подачи — показывает, когда закрывается больше всего тендеров (когда нужно быть готовым с заявкой и обеспечением). По мере накопления истории картина станет точнее.</p>
  </div>`;
}

function paint(){
  if(!DATA){ return; }
  if(!(DATA.categories||[]).length && !(DATA.season_total)){
    $("#root").innerHTML = note("Аналитика пока пустая",
      "Как только на витрине накопятся тендеры с категориями и сроками, здесь появятся рейтинг ниш и сезонность.",
      "/", "Перейти к витрине");
    return;
  }
  $("#root").innerHTML = rankingHtml() + seasonHtml() + `<div class="cta">
    <div class="cta-tx">Нашли выгодную нишу? <b>Отфильтруйте витрину по категории и заберите все тендеры.</b></div>
    <a class="cta-btn" href="/">Открыть витрину →</a>
  </div>`;
}

document.addEventListener("click", (e) => {
  const b = e.target.closest("[data-sort]");
  if(!b) return;
  sortMetric = b.dataset.sort;
  paint();
});

async function loadInsights(){
  try{
    const headers = TOKEN ? {"X-Auth-Token": TOKEN} : {};
    const r = await fetch("/api/insights", {headers});
    if(!r.ok){ $("#root").innerHTML = `<div class="note"><h2>Ошибка ${r.status}</h2><p>Не удалось загрузить аналитику. Обновите страницу.</p></div>`; return; }
    DATA = await r.json();
    if(!DATA.entitled) sortMetric = "volume";
    paint();
    if(TOKEN){
      try{ const m = await fetch("/api/auth/me",{headers:{"X-Auth-Token":TOKEN}}); if(m.ok){ $("#who").textContent = (await m.json()).email; } }catch(e){}
    }
  }catch(e){
    $("#root").innerHTML = `<div class="note"><h2>Ошибка</h2><p>Не удалось загрузить аналитику.</p></div>`;
  }
}

loadInsights();
</script>
</body>
</html>
